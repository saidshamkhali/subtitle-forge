[defaults]
source_language = "en"
target_language = "fa"
argos_device = "cpu"
cleanup_provider = "codex"
cleanup_batch_size = 100
keep_intermediate = false

[providers.codex]
command = "codex"
extra_args = ["exec", "--skip-git-repo-check"]
# model = "gpt-5.5"
# reasoning_effort = "low"

[providers.opencode]
api_key_env = "OPENCODE_API_KEY"
base_url = "https://opencode.ai/zen/go/v1/chat/completions"
model = "deepseek-v4-flash"
# reasoning_effort = "max"  # Uncomment to enable deep reasoning (adds latency)

[translation]
preserve_names = true
preserve_formatting = true
style = "natural subtitle translation"

[quality]
allowed_latin_names = [
  "City Hunter",
  "Kaori",
  "Kiyoko",
  "Imamura",
  "MacDonald",
  "Olsen Park",
  "Hong Kong",
  "Mah Jong",
  "Thunder Strikers",
  "Dragon Claw",
  "White Crane",
]
